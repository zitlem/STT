name: Cleanup Storage

on:
  workflow_dispatch:
    inputs:
      delete_all:
        description: 'Delete ALL artifacts and runs (ignore age filter)'
        required: false
        default: false
        type: boolean
      max_age_days:
        description: 'Delete items older than this many days (ignored if delete_all is true)'
        required: false
        default: '2'
        type: number
      dry_run:
        description: 'List items without deleting'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const deleteAll = ${{ inputs.delete_all || false }};
            const maxAgeDays = ${{ inputs.max_age_days || 2 }};
            const dryRun = ${{ inputs.dry_run || false }};
            const cutoff = new Date(Date.now() - maxAgeDays * 24 * 60 * 60 * 1000);

            if (deleteAll) {
              console.log('Deleting ALL artifacts');
            } else {
              console.log(`Deleting artifacts older than ${maxAgeDays} days (before ${cutoff.toISOString()})`);
            }
            if (dryRun) console.log('DRY RUN — nothing will be deleted');

            let deleted = 0;
            let totalSize = 0;

            while (true) {
              const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page: 1,
              });

              if (artifacts.length === 0) break;

              let deletedThisPage = false;
              for (const artifact of artifacts) {
                const createdAt = new Date(artifact.created_at);
                if (deleteAll || createdAt < cutoff) {
                  const sizeMB = (artifact.size_in_bytes / 1024 / 1024).toFixed(2);
                  console.log(`${dryRun ? '[DRY RUN] Would delete' : 'Deleting'}: ${artifact.name} (${sizeMB} MB, created ${artifact.created_at})`);

                  if (!dryRun) {
                    await github.rest.actions.deleteArtifact({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      artifact_id: artifact.id,
                    });
                    deletedThisPage = true;
                  }

                  deleted++;
                  totalSize += artifact.size_in_bytes;
                }
              }

              if (dryRun || !deletedThisPage) break;
            }

            const totalMB = (totalSize / 1024 / 1024).toFixed(2);
            console.log(`\n${dryRun ? 'Would delete' : 'Deleted'} ${deleted} artifact(s), freeing ${totalMB} MB`);

      - name: Delete workflow run logs
        uses: actions/github-script@v7
        with:
          script: |
            const deleteAll = ${{ inputs.delete_all || false }};
            const maxAgeDays = ${{ inputs.max_age_days || 2 }};
            const dryRun = ${{ inputs.dry_run || false }};
            const cutoff = new Date(Date.now() - maxAgeDays * 24 * 60 * 60 * 1000);

            if (deleteAll) {
              console.log('Deleting ALL workflow runs');
            } else {
              console.log(`Deleting workflow runs older than ${maxAgeDays} days (before ${cutoff.toISOString()})`);
            }
            if (dryRun) console.log('DRY RUN — nothing will be deleted');

            const currentRunId = context.runId;
            let deleted = 0;

            while (true) {
              const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page: 1,
              });

              if (workflow_runs.length === 0) break;

              let deletedThisPage = false;
              for (const run of workflow_runs) {
                if (run.id === currentRunId) continue;
                const createdAt = new Date(run.created_at);
                if (deleteAll || createdAt < cutoff) {
                  console.log(`${dryRun ? '[DRY RUN] Would delete' : 'Deleting'}: ${run.name} #${run.run_number} (${run.status}, created ${run.created_at})`);

                  if (!dryRun) {
                    await github.rest.actions.deleteWorkflowRun({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      run_id: run.id,
                    });
                    deletedThisPage = true;
                  }

                  deleted++;
                }
              }

              if (dryRun || !deletedThisPage) break;
            }

            console.log(`\n${dryRun ? 'Would delete' : 'Deleted'} ${deleted} workflow run(s)`);

      - name: Clear action caches
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = ${{ inputs.dry_run || false }};

            console.log('Clearing action caches');
            if (dryRun) console.log('DRY RUN — nothing will be deleted');

            let deleted = 0;
            let totalSize = 0;

            while (true) {
              const { data: { actions_caches } } = await github.rest.actions.getActionsCacheList({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });

              if (actions_caches.length === 0) break;

              let deletedThisPage = false;
              for (const cache of actions_caches) {
                const sizeMB = (cache.size_in_bytes / 1024 / 1024).toFixed(2);
                console.log(`${dryRun ? '[DRY RUN] Would delete' : 'Deleting'}: ${cache.key} (${sizeMB} MB)`);

                if (!dryRun) {
                  await github.rest.actions.deleteActionsCacheById({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    cache_id: cache.id,
                  });
                  deletedThisPage = true;
                }

                deleted++;
                totalSize += cache.size_in_bytes;
              }

              if (dryRun || !deletedThisPage) break;
            }

            const totalMB = (totalSize / 1024 / 1024).toFixed(2);
            console.log(`\n${dryRun ? 'Would delete' : 'Deleted'} ${deleted} cache(s), freeing ${totalMB} MB`);
