name: Build Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      windows:
        description: "Build Windows"
        type: boolean
        default: true
      macos:
        description: "Build macOS"
        type: boolean
        default: true
      linux:
        description: "Build Linux"
        type: boolean
        default: false
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Tests & lint gate ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install test deps
        run: |
          # The suite inspects speech_to_text.py via ast (see tests/conftest.py),
          # so no ML runtime deps are needed here.
          uv venv
          uv pip install -r requirements-dev.txt certifi
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest

  # ── Version computation ────────────────────────────────────────────────────
  version:
    needs: test
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            # A hand-pushed tag must ship a matching VERSION file, or every
            # deployed watchdog will loop on "update available" forever.
            if [ "$(cat VERSION)" != "${TAG#v}" ]; then
              echo "::error::VERSION file ($(cat VERSION)) does not match tag $TAG — commit the bump before tagging"
              exit 1
            fi
          else
            COUNT=$(git rev-list --count HEAD)
            MINOR=$((COUNT / 256))
            PATCH=$((COUNT % 256))
            TAG="$(date +%y).$MINOR.$PATCH"
            if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "::error::tag $TAG already exists — push a commit before re-releasing"
              exit 1
            fi
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # ── Per-platform build jobs ────────────────────────────────────────────────
  build-windows:
    needs: version
    if: github.event_name == 'push' || inputs.windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install build tools
        shell: bash
        run: |
          # Thin bootstrapper only needs PyInstaller + certifi + pillow (icon).
          # No torch/ML: those install on the end-user machine at first run.
          uv venv
          uv pip install pyinstaller certifi pillow
      - name: Set version
        shell: bash
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "${TAG#v}" > VERSION
      - name: Generate icon
        shell: bash
        run: uv run python packaging/make_icon.py
      - name: Build
        shell: bash
        run: uv run pyinstaller packaging/watchdog.spec --noconfirm
      - name: Package installer
        shell: pwsh
        run: |
          $VERSION = "${{ needs.version.outputs.tag }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$VERSION" "installer\windows\setup.iss"
      - uses: actions/upload-artifact@v6
        with:
          name: STT-windows
          path: Output/STT-Setup.exe
          retention-days: 30

  build-macos:
    needs: version
    if: github.event_name == 'push' || inputs.macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          # Thin bootstrapper only; runtime deps install on the user machine.
          uv venv
          uv pip install pyinstaller certifi pillow
      - name: Set version
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "${TAG#v}" > VERSION
      - name: Generate icon
        run: uv run python packaging/make_icon.py
      - name: Build
        run: uv run pyinstaller packaging/watchdog.spec --noconfirm
      - name: Sign (ad-hoc)
        run: |
          find dist/STT.app -type f \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign --force --sign - {} \;
          find dist/STT.app/Contents/MacOS -maxdepth 2 -name "Python" -type f \
            -exec codesign --force --sign - {} \;
          codesign --force --sign - dist/STT.app
      - name: Package installer
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          mkdir -p pkg_root
          cp -r dist/STT.app pkg_root/
          pkgbuild \
            --root pkg_root \
            --install-location /Applications \
            --scripts installer/macos/scripts \
            --identifier com.stt.watchdog \
            --version "$VERSION" \
            stt-component.pkg
          productbuild --package stt-component.pkg --version "$VERSION" STT-macos-arm64.pkg
          rm stt-component.pkg
      - uses: actions/upload-artifact@v6
        with:
          name: STT-macos-arm64
          path: STT-macos-arm64.pkg
          retention-days: 30

  build-linux:
    needs: version
    if: github.event_name == 'push' || inputs.linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          # Thin bootstrapper only; runtime deps install on the user machine.
          uv venv
          uv pip install pyinstaller certifi pillow
      - name: Set version
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "${TAG#v}" > VERSION
      - name: Generate icon
        run: uv run python packaging/make_icon.py
      - name: Build
        run: uv run pyinstaller packaging/watchdog.spec --noconfirm
      - name: Package installer
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          PKGDIR="stt-watchdog_${VERSION}_amd64"
          mkdir -p "$PKGDIR/opt/STT"
          cp -r dist/STT/. "$PKGDIR/opt/STT/"
          cp -r installer/linux/DEBIAN "$PKGDIR/DEBIAN"
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" "$PKGDIR/DEBIAN/control"
          chmod 755 "$PKGDIR/DEBIAN/postinst" "$PKGDIR/DEBIAN/prerm"
          dpkg-deb --build --root-owner-group "$PKGDIR" STT-linux.deb
      - uses: actions/upload-artifact@v6
        with:
          name: STT-linux
          path: STT-linux.deb
          retention-days: 30

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    needs: [version, build-windows, build-macos, build-linux]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Commit the VERSION bump and tag it, so the tag's tree carries the
      # version it was released as. Deployed watchdogs read SOURCE/VERSION
      # after updating — without this they'd see "update available" forever.
      - name: Bump VERSION and tag (dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "${TAG#v}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump VERSION to ${TAG#v}"
          fi
          git tag "$TAG"
          # Checkout is detached at the trigger SHA; push back to the branch
          # the workflow was dispatched from, plus the new tag.
          git push origin "HEAD:refs/heads/${{ github.ref_name }}" "refs/tags/$TAG"

      - uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          for f in artifacts/*/*; do
            (cd "$(dirname "$f")" && shasum -a 256 "$(basename "$f")")
          done > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: STT ${{ needs.version.outputs.tag }}
          prerelease: ${{ inputs.prerelease == true }}
          files: |
            artifacts/**/*
            SHA256SUMS.txt
          generate_release_notes: true

