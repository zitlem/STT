name: Build Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      windows:
        description: "Build Windows"
        type: boolean
        default: true
      macos:
        description: "Build macOS"
        type: boolean
        default: true
      linux:
        description: "Build Linux"
        type: boolean
        default: false
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Tests & lint gate ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install test deps
        run: |
          # The suite inspects speech_to_text.py via ast (see tests/conftest.py),
          # so no ML runtime deps are needed here.
          uv venv
          uv pip install -r requirements-dev.txt certifi
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest

  # ── Version computation ────────────────────────────────────────────────────
  version:
    needs: test
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            # A hand-pushed tag must ship a matching VERSION file, or every
            # deployed watchdog will loop on "update available" forever.
            if [ "$(cat VERSION)" != "${TAG#v}" ]; then
              echo "::error::VERSION file ($(cat VERSION)) does not match tag $TAG — commit the bump before tagging"
              exit 1
            fi
          else
            COUNT=$(git rev-list --count HEAD)
            MINOR=$((COUNT / 256))
            PATCH=$((COUNT % 256))
            TAG="$(date +%y).$MINOR.$PATCH"
            if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "::error::tag $TAG already exists — push a commit before re-releasing"
              exit 1
            fi
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # ── Per-platform build jobs ────────────────────────────────────────────────
  build-windows:
    needs: version
    if: github.event_name == 'push' || inputs.windows
    runs-on: windows-latest
    env:
      # Signing activates automatically once the secret exists; otherwise the
      # build stays unsigned (same pattern as ChurchPresenter).
      WINDOWS_SIGNING_ENABLED: ${{ secrets.WINDOWS_CERTIFICATE_PFX != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install build tools
        shell: bash
        run: |
          # Thin bootstrapper needs PyInstaller + certifi + pillow (icon) + sentry-sdk
          # (bundled so first-run provisioning failures report to Sentry).
          # No torch/ML: those install on the end-user machine at first run.
          uv venv
          uv pip install pyinstaller certifi pillow "sentry-sdk>=2.0,<3"
      - name: Set version
        shell: bash
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "${TAG#v}" > VERSION
      - name: Generate icon
        shell: bash
        run: uv run python packaging/make_icon.py
      - name: Build
        shell: bash
        run: uv run pyinstaller packaging/watchdog.spec --noconfirm
      - name: Sign watchdog binary
        if: env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        env:
          CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERTIFICATE_PFX))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found in Windows SDK" }
          & $signtool.FullName sign /f $pfx /p $env:CERTIFICATE_PASSWORD `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist\STT\STT.exe
          if ($LASTEXITCODE -ne 0) { throw "signtool failed" }
          Add-Content $env:GITHUB_ENV "SIGNTOOL_PATH=$($signtool.FullName)"
          Add-Content $env:GITHUB_ENV "PFX_PATH=$pfx"
      - name: Package installer
        shell: pwsh
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $VERSION = "${{ needs.version.outputs.tag }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if ($env:WINDOWS_SIGNING_ENABLED -eq 'true') {
            # $q = quote, $f = file placeholder in Inno's SignTool syntax
            $cmd = "`$q$env:SIGNTOOL_PATH`$q sign /f `$q$env:PFX_PATH`$q /p $env:CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 `$f"
            & $iscc "/DAppVersion=$VERSION" "/DSignBuild" "/Ssigntool=$cmd" "installer\windows\setup.iss"
          } else {
            & $iscc "/DAppVersion=$VERSION" "installer\windows\setup.iss"
          }
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }
      - uses: actions/upload-artifact@v6
        with:
          name: STT-windows
          path: Output/STT-Setup.exe
          retention-days: 30

  build-macos:
    needs: version
    if: github.event_name == 'push' || inputs.macos
    runs-on: macos-latest
    env:
      # App signing activates once MACOS_CERTIFICATE_P12 exists; pkg signing +
      # notarization additionally need MACOS_INSTALLER_CERTIFICATE_P12
      # (a Developer ID *Installer* cert — the Application cert can't sign pkgs).
      MACOS_SIGNING_ENABLED: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && 'true' || 'false' }}
      PKG_SIGNING_ENABLED: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_P12 != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          # Thin bootstrapper only; runtime deps install on the user machine.
          uv venv
          uv pip install pyinstaller certifi pillow "sentry-sdk>=2.0,<3"
      - name: Set version
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "${TAG#v}" > VERSION
      - name: Generate icon
        run: uv run python packaging/make_icon.py
      - name: Build
        run: uv run pyinstaller packaging/watchdog.spec --noconfirm
      - name: Import signing certificates into temporary keychain
        if: env.MACOS_SIGNING_ENABLED == 'true'
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          INSTALLER_CERTIFICATE_P12: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_P12 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/productsign

          if [ "$PKG_SIGNING_ENABLED" = "true" ]; then
            echo "$INSTALLER_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/installer.p12"
            security import "$RUNNER_TEMP/installer.p12" \
              -k "$KEYCHAIN_PATH" -P "$INSTALLER_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/productsign
          fi

          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          EXISTING=$(security list-keychains -d user | tr -d '"' | awk '{$1=$1};1')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING
          echo "Signing certificates imported"
      - name: Sign app bundle
        env:
          IDENTITY_NAME: ${{ secrets.MACOS_IDENTITY_NAME }}
        run: |
          if [ "$MACOS_SIGNING_ENABLED" = "true" ]; then
            # Hardened runtime + secure timestamp on every Mach-O, entitlements
            # on the executables — required for notarization of PyInstaller apps.
            find dist/STT.app -type f \( -name "*.dylib" -o -name "*.so" \) \
              -exec codesign --force --options runtime --timestamp --sign "$IDENTITY_NAME" {} \;
            find dist/STT.app/Contents/MacOS -maxdepth 2 -name "Python" -type f \
              -exec codesign --force --options runtime --timestamp \
                --entitlements installer/macos/entitlements.plist --sign "$IDENTITY_NAME" {} \;
            codesign --force --options runtime --timestamp \
              --entitlements installer/macos/entitlements.plist --sign "$IDENTITY_NAME" dist/STT.app
            codesign --verify --deep --strict dist/STT.app
          else
            find dist/STT.app -type f \( -name "*.dylib" -o -name "*.so" \) \
              -exec codesign --force --sign - {} \;
            find dist/STT.app/Contents/MacOS -maxdepth 2 -name "Python" -type f \
              -exec codesign --force --sign - {} \;
            codesign --force --sign - dist/STT.app
          fi
      - name: Package installer
        env:
          IDENTITY_NAME: ${{ secrets.MACOS_IDENTITY_NAME }}
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          mkdir -p pkg_root
          cp -r dist/STT.app pkg_root/
          pkgbuild \
            --root pkg_root \
            --install-location /Applications \
            --scripts installer/macos/scripts \
            --identifier com.stt.watchdog \
            --version "$VERSION" \
            stt-component.pkg
          if [ "$PKG_SIGNING_ENABLED" = "true" ]; then
            # Same name as the Application identity, different cert type
            INSTALLER_IDENTITY="${IDENTITY_NAME/Developer ID Application/Developer ID Installer}"
            productbuild --package stt-component.pkg --version "$VERSION" \
              --sign "$INSTALLER_IDENTITY" --timestamp STT-macos-arm64.pkg
          else
            productbuild --package stt-component.pkg --version "$VERSION" STT-macos-arm64.pkg
          fi
          rm stt-component.pkg
      - name: Notarize and staple
        if: env.PKG_SIGNING_ENABLED == 'true'
        env:
          API_KEY_P8: ${{ secrets.MACOS_NOTARIZATION_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.MACOS_NOTARIZATION_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.MACOS_NOTARIZATION_API_ISSUER_ID }}
        run: |
          echo "$API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool submit STT-macos-arm64.pkg \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait
          xcrun stapler staple STT-macos-arm64.pkg
          spctl --assess --type install -v STT-macos-arm64.pkg
      - uses: actions/upload-artifact@v6
        with:
          name: STT-macos-arm64
          path: STT-macos-arm64.pkg
          retention-days: 30

  build-linux:
    needs: version
    if: github.event_name == 'push' || inputs.linux
    runs-on: ubuntu-22.04
    env:
      LINUX_SIGNING_ENABLED: ${{ secrets.LINUX_GPG_PRIVATE_KEY != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          # Thin bootstrapper only; runtime deps install on the user machine.
          uv venv
          uv pip install pyinstaller certifi pillow "sentry-sdk>=2.0,<3"
      - name: Set version
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "${TAG#v}" > VERSION
      - name: Generate icon
        run: uv run python packaging/make_icon.py
      - name: Build
        run: uv run pyinstaller packaging/watchdog.spec --noconfirm
      - name: Package installer
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          PKGDIR="stt-watchdog_${VERSION}_amd64"
          mkdir -p "$PKGDIR/opt/STT"
          cp -r dist/STT/. "$PKGDIR/opt/STT/"
          cp -r installer/linux/DEBIAN "$PKGDIR/DEBIAN"
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" "$PKGDIR/DEBIAN/control"
          chmod 755 "$PKGDIR/DEBIAN/postinst" "$PKGDIR/DEBIAN/prerm"
          dpkg-deb --build --root-owner-group "$PKGDIR" STT-linux.deb
      - name: GPG-sign .deb
        if: env.LINUX_SIGNING_ENABLED == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q dpkg-sig
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s' "$GPG_PASSPHRASE" > "$RUNNER_TEMP/gpg-pass"
          dpkg-sig --sign builder \
            -g "--batch --pinentry-mode loopback --passphrase-file $RUNNER_TEMP/gpg-pass" \
            STT-linux.deb
          # dpkg-sig --verify reports BADSIG on its own output with gnupg2;
          # verify the embedded clearsigned manifest with gpg directly instead.
          ar p STT-linux.deb _gpgbuilder | gpg --verify -
      - uses: actions/upload-artifact@v6
        with:
          name: STT-linux
          path: STT-linux.deb
          retention-days: 30

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    needs: [version, build-windows, build-macos, build-linux]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Commit the VERSION bump and tag it, so the tag's tree carries the
      # version it was released as. Deployed watchdogs read SOURCE/VERSION
      # after updating — without this they'd see "update available" forever.
      - name: Bump VERSION and tag (dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          echo "${TAG#v}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump VERSION to ${TAG#v}"
          fi
          git tag "$TAG"
          # Checkout is detached at the trigger SHA; push back to the branch
          # the workflow was dispatched from, plus the new tag.
          git push origin "HEAD:refs/heads/${{ github.ref_name }}" "refs/tags/$TAG"

      - uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          for f in artifacts/*/*; do
            (cd "$(dirname "$f")" && shasum -a 256 "$(basename "$f")")
          done > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: STT ${{ needs.version.outputs.tag }}
          prerelease: ${{ inputs.prerelease == true }}
          files: |
            artifacts/**/*
            SHA256SUMS.txt
          generate_release_notes: true

