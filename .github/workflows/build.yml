name: Build Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      windows:
        description: "Build Windows"
        type: boolean
        default: true
      macos:
        description: "Build macOS"
        type: boolean
        default: true
      linux:
        description: "Build Linux"
        type: boolean
        default: false
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── Version computation ────────────────────────────────────────────────────
  version:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list --count HEAD)
            MINOR=$((COUNT / 256))
            PATCH=$((COUNT % 256))
            echo "tag=$(date +%y).$MINOR.$PATCH" >> $GITHUB_OUTPUT
          fi

  # ── Per-platform build jobs ────────────────────────────────────────────────
  build-windows:
    needs: version
    if: github.event_name == 'push' || inputs.windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        shell: bash
        run: |
          uv venv
          uv pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          uv pip install pyinstaller certifi "numpy<2.0.0"
          uv pip install flask flask-socketio flask-cors python-socketio
          uv pip install transformers huggingface_hub
          uv pip install "git+https://github.com/openai/whisper.git"
          uv pip install faster-whisper silero-vad
          uv pip install SpeechRecognition soundfile librosa pydub
          uv pip install edge-tts piper-tts pytz smbprotocol pillow
      - name: Set version
        shell: bash
        run: echo "${{ needs.version.outputs.tag }}" > VERSION
      - name: Generate icon
        shell: bash
        run: uv run python make_icon.py
      - name: Build
        shell: bash
        run: uv run pyinstaller watchdog.spec --noconfirm
      - name: Package installer
        shell: pwsh
        run: |
          $VERSION = "${{ needs.version.outputs.tag }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$VERSION" "installer\windows\setup.iss"
      - uses: actions/upload-artifact@v6
        with:
          name: STT-windows
          path: Output/STT-Setup.exe
          retention-days: 30

  build-macos:
    needs: version
    if: github.event_name == 'push' || inputs.macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install system deps
        run: brew install portaudio libsndfile
      - name: Install dependencies
        run: |
          uv venv
          uv pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          uv pip install pyinstaller certifi "numpy<2.0.0"
          uv pip install flask flask-socketio flask-cors python-socketio
          uv pip install transformers huggingface_hub
          uv pip install "git+https://github.com/openai/whisper.git"
          uv pip install faster-whisper silero-vad
          uv pip install SpeechRecognition soundfile librosa pydub
          uv pip install edge-tts piper-tts pytz smbprotocol pillow
      - name: Set version
        run: echo "${{ needs.version.outputs.tag }}" > VERSION
      - name: Generate icon
        run: uv run python make_icon.py
      - name: Build
        run: uv run pyinstaller watchdog.spec --noconfirm
      - name: Sign (ad-hoc)
        run: |
          find dist/STT.app -type f \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign --force --sign - {} \;
          find dist/STT.app/Contents/MacOS -maxdepth 2 -name "Python" -type f \
            -exec codesign --force --sign - {} \;
          codesign --force --sign - dist/STT.app
      - name: Package installer
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          mkdir -p pkg_root
          cp -r dist/STT.app pkg_root/
          pkgbuild \
            --root pkg_root \
            --install-location /Applications \
            --scripts installer/macos/scripts \
            --identifier com.stt.watchdog \
            --version "$VERSION" \
            stt-component.pkg
          productbuild --package stt-component.pkg --version "$VERSION" STT-macos-arm64.pkg
          rm stt-component.pkg
      - uses: actions/upload-artifact@v6
        with:
          name: STT-macos-arm64
          path: STT-macos-arm64.pkg
          retention-days: 30

  build-linux:
    needs: version
    if: github.event_name == 'push' || inputs.linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y portaudio19-dev python3-dev libasound2-dev libsndfile1
      - name: Install dependencies
        run: |
          uv venv
          uv pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          uv pip install pyinstaller certifi "numpy<2.0.0"
          uv pip install flask flask-socketio flask-cors python-socketio
          uv pip install transformers huggingface_hub
          uv pip install "git+https://github.com/openai/whisper.git"
          uv pip install faster-whisper silero-vad
          uv pip install SpeechRecognition soundfile librosa pydub
          uv pip install edge-tts piper-tts pytz smbprotocol pillow
      - name: Set version
        run: echo "${{ needs.version.outputs.tag }}" > VERSION
      - name: Generate icon
        run: uv run python make_icon.py
      - name: Build
        run: uv run pyinstaller watchdog.spec --noconfirm
      - name: Package installer
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          PKGDIR="stt-watchdog_${VERSION}_amd64"
          mkdir -p "$PKGDIR/opt/STT"
          cp -r dist/STT/. "$PKGDIR/opt/STT/"
          cp -r installer/linux/DEBIAN "$PKGDIR/DEBIAN"
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" "$PKGDIR/DEBIAN/control"
          chmod 755 "$PKGDIR/DEBIAN/postinst" "$PKGDIR/DEBIAN/prerm"
          dpkg-deb --build --root-owner-group "$PKGDIR" STT-linux.deb
      - uses: actions/upload-artifact@v6
        with:
          name: STT-linux
          path: STT-linux.deb
          retention-days: 30

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    needs: [version, build-windows, build-macos, build-linux]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: STT ${{ needs.version.outputs.tag }}
          prerelease: ${{ inputs.prerelease == true }}
          files: artifacts/**/*
          generate_release_notes: true

