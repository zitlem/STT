name: Build Executable

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build for'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
      publish_release:
        description: 'Publish as GitHub Release'
        required: false
        default: true
        type: boolean
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Required if publishing.'
        required: false
        type: string

jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install flask flask-socketio flask-cors python-socketio
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cu121
          pip install transformers huggingface_hub accelerate datasets
          pip install openai-whisper faster-whisper silero-vad
          pip install SpeechRecognition pyaudio soundfile librosa pydub numpy"<2.0.0"
          pip install edge-tts piper-tts
          pip install pytz smbprotocol eventlet

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stt-windows
          path: dist/stt-windows/
          retention-days: 30

  build-macos:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' }}
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install flask flask-socketio flask-cors python-socketio
          pip install torch torchaudio
          pip install transformers huggingface_hub accelerate datasets
          pip install openai-whisper faster-whisper silero-vad
          pip install SpeechRecognition pyaudio soundfile librosa pydub numpy"<2.0.0"
          pip install edge-tts piper-tts
          pip install pytz smbprotocol eventlet

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stt-macos
          path: dist/stt-macos/
          retention-days: 30

  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install flask flask-socketio flask-cors python-socketio
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cu121
          pip install transformers huggingface_hub accelerate datasets
          pip install openai-whisper faster-whisper silero-vad
          pip install SpeechRecognition pyaudio soundfile librosa pydub numpy"<2.0.0"
          pip install edge-tts piper-tts
          pip install pytz smbprotocol eventlet

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stt-linux
          path: dist/stt-linux/
          retention-days: 30

  release:
    needs: [build-windows, build-macos, build-linux]
    # Run even if some platform builds were skipped (not all platforms selected)
    if: ${{ always() && github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '' }}
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: STT ${{ github.event.inputs.release_tag }}
          draft: false
          prerelease: false
          files: |
            stt-windows.zip
            stt-macos.zip
            stt-linux.zip
          generate_release_notes: true
