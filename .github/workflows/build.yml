name: Build Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      windows:
        description: "Build Windows"
        type: boolean
        default: true
      macos:
        description: "Build macOS"
        type: boolean
        default: true
      linux:
        description: "Build Linux"
        type: boolean
        default: true
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── Per-platform build jobs ────────────────────────────────────────────────
  build-windows:
    if: github.event_name == 'push' || inputs.windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        shell: bash
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller certifi "numpy<2.0.0"
          pip install flask flask-socketio flask-cors python-socketio
          pip install transformers huggingface_hub accelerate datasets
          pip install "git+https://github.com/openai/whisper.git"
          pip install faster-whisper silero-vad
          pip install SpeechRecognition pyaudio soundfile librosa pydub
          pip install edge-tts piper-tts pytz smbprotocol
      - name: Build
        shell: bash
        run: |
          pyinstaller stt.spec --noconfirm
          pyinstaller watchdog.spec --noconfirm
          cp dist/STT-Watchdog.exe dist/STT/
      - name: Package
        shell: pwsh
        run: Compress-Archive -Path dist\STT -DestinationPath STT-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: STT-windows
          path: STT-windows.zip
          retention-days: 30

  build-macos:
    if: github.event_name == 'push' || inputs.macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: brew install portaudio libsndfile
      - name: Install dependencies
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller certifi "numpy<2.0.0"
          pip install flask flask-socketio flask-cors python-socketio
          pip install transformers huggingface_hub accelerate datasets
          pip install "git+https://github.com/openai/whisper.git"
          pip install faster-whisper silero-vad
          pip install SpeechRecognition pyaudio soundfile librosa pydub
          pip install edge-tts piper-tts pytz smbprotocol
      - name: Build
        run: |
          pyinstaller stt.spec --noconfirm
          pyinstaller watchdog.spec --noconfirm
          cp dist/STT-Watchdog dist/STT/
      - name: Package
        run: tar -czf STT-macos.tar.gz -C dist STT
      - uses: actions/upload-artifact@v4
        with:
          name: STT-macos
          path: STT-macos.tar.gz
          retention-days: 30

  build-linux:
    if: github.event_name == 'push' || inputs.linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y portaudio19-dev python3-dev libasound2-dev libsndfile1
      - name: Install dependencies
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller certifi "numpy<2.0.0"
          pip install flask flask-socketio flask-cors python-socketio
          pip install transformers huggingface_hub accelerate datasets
          pip install "git+https://github.com/openai/whisper.git"
          pip install faster-whisper silero-vad
          pip install SpeechRecognition pyaudio soundfile librosa pydub
          pip install edge-tts piper-tts pytz smbprotocol
      - name: Build
        run: |
          pyinstaller stt.spec --noconfirm
          pyinstaller watchdog.spec --noconfirm
          cp dist/STT-Watchdog dist/STT/
      - name: Package
        run: tar -czf STT-linux.tar.gz -C dist STT
      - uses: actions/upload-artifact@v4
        with:
          name: STT-linux
          path: STT-linux.tar.gz
          retention-days: 30

  # ── Release (tag pushes only) ──────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    if: always() && startsWith(github.ref, 'refs/tags/') && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          name: STT ${{ github.ref_name }}
          prerelease: ${{ inputs.prerelease == true }}
          files: artifacts/**/*
          generate_release_notes: true
