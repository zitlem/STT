name: Build Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      windows:
        description: "Build Windows"
        type: boolean
        default: true
      macos:
        description: "Build macOS"
        type: boolean
        default: true
      linux:
        description: "Build Linux"
        type: boolean
        default: true
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── Version computation ────────────────────────────────────────────────────
  version:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list --count HEAD)
            MINOR=$((COUNT / 256))
            PATCH=$((COUNT % 256))
            echo "tag=$(date +%y).$MINOR.$PATCH" >> $GITHUB_OUTPUT
          fi

  # ── Per-platform build jobs ────────────────────────────────────────────────
  build-windows:
    needs: version
    if: github.event_name == 'push' || inputs.windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        shell: bash
        run: |
          uv venv
          uv pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          uv pip install pyinstaller certifi "numpy<2.0.0"
          uv pip install flask flask-socketio flask-cors python-socketio
          uv pip install transformers huggingface_hub accelerate datasets
          uv pip install "git+https://github.com/openai/whisper.git"
          uv pip install faster-whisper silero-vad
          uv pip install SpeechRecognition pyaudio soundfile librosa pydub
          uv pip install edge-tts piper-tts pytz smbprotocol
      - name: Set version
        shell: bash
        run: echo "${{ needs.version.outputs.tag }}" > VERSION
      - name: Build
        shell: bash
        run: |
          uv run pyinstaller stt.spec --noconfirm
          uv run pyinstaller watchdog.spec --noconfirm
          cp dist/STT-Watchdog.exe dist/STT/
      - name: Package
        shell: pwsh
        run: Compress-Archive -Path dist\STT -DestinationPath STT-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: STT-windows
          path: STT-windows.zip
          retention-days: 30

  build-macos:
    needs: version
    if: github.event_name == 'push' || inputs.macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - name: Install system deps
        run: brew install portaudio libsndfile
      - name: Install dependencies
        run: |
          uv venv
          uv pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          uv pip install pyinstaller certifi "numpy<2.0.0"
          uv pip install flask flask-socketio flask-cors python-socketio
          uv pip install transformers huggingface_hub accelerate datasets
          uv pip install "git+https://github.com/openai/whisper.git"
          uv pip install faster-whisper silero-vad
          uv pip install SpeechRecognition pyaudio soundfile librosa pydub
          uv pip install edge-tts piper-tts pytz smbprotocol
      - name: Set version
        run: echo "${{ needs.version.outputs.tag }}" > VERSION
      - name: Build
        run: |
          uv run pyinstaller stt.spec --noconfirm
          uv run pyinstaller watchdog.spec --noconfirm
          cp dist/STT-Watchdog dist/STT/
      - name: Package
        run: tar -czf STT-macos.tar.gz -C dist STT
      - uses: actions/upload-artifact@v4
        with:
          name: STT-macos
          path: STT-macos.tar.gz
          retention-days: 30

  build-linux:
    needs: version
    if: github.event_name == 'push' || inputs.linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y portaudio19-dev python3-dev libasound2-dev libsndfile1
      - name: Install dependencies
        run: |
          uv venv
          uv pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          uv pip install pyinstaller certifi "numpy<2.0.0"
          uv pip install flask flask-socketio flask-cors python-socketio
          uv pip install transformers huggingface_hub accelerate datasets
          uv pip install "git+https://github.com/openai/whisper.git"
          uv pip install faster-whisper silero-vad
          uv pip install SpeechRecognition pyaudio soundfile librosa pydub
          uv pip install edge-tts piper-tts pytz smbprotocol
      - name: Set version
        run: echo "${{ needs.version.outputs.tag }}" > VERSION
      - name: Build
        run: |
          uv run pyinstaller stt.spec --noconfirm
          uv run pyinstaller watchdog.spec --noconfirm
          cp dist/STT-Watchdog dist/STT/
      - name: Package
        run: tar -czf STT-linux.tar.gz -C dist STT
      - uses: actions/upload-artifact@v4
        with:
          name: STT-linux
          path: STT-linux.tar.gz
          retention-days: 30

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    needs: [version, build-windows, build-macos, build-linux]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: STT ${{ needs.version.outputs.tag }}
          prerelease: ${{ inputs.prerelease == true }}
          files: artifacts/**/*
          generate_release_notes: true

      - name: Bump VERSION in repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull
          echo "${{ needs.version.outputs.tag }}" > VERSION
          git add VERSION
          git commit -m "chore: bump version to ${{ needs.version.outputs.tag }} [skip ci]"
          git push
