name: Tests

# Day-to-day gate: build.yml only runs the suite on release tags, so this
# workflow covers every push and PR.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
      - name: Install test deps
        run: |
          # stt/ modules and the ast-inspection tests (see tests/conftest.py)
          # need no ML runtime deps.
          uv venv
          uv pip install -r requirements-dev.txt certifi
      - name: Lint
        run: uv run ruff check .
      - name: Test with coverage
        run: uv run pytest --cov --cov-report=term
