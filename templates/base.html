<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Speech to Text{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='fonts/inter.css') }}">
    <script src="{{ url_for('static', filename='socket.io.js') }}"></script>
    <style>
        :root {
            /* Backgrounds */
            --bg-deep: #050506;
            --bg-base: #0a0a0c;
            --bg-elevated: rgba(255, 255, 255, 0.04);
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-input: rgba(255, 255, 255, 0.04);

            /* Text */
            --text-primary: #EDEDEF;
            --text-secondary: #8A8F98;
            --text-muted: #5A5E66;

            /* Accent */
            --accent: #7C6BF0;
            --accent-hover: #9B8FFF;
            --accent-glow: rgba(124, 107, 240, 0.2);
            --accent-subtle: rgba(124, 107, 240, 0.1);

            /* Status */
            --success: #22C55E;
            --success-bg: rgba(34, 197, 94, 0.1);
            --warning: #F59E0B;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --danger: #EF4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --info: #3B82F6;
            --info-bg: rgba(59, 130, 246, 0.1);

            /* Borders & surfaces */
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-blur: 12px;

            /* Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;

            /* Easing */
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 12px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Skip to content - accessibility */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--accent);
            color: #fff;
            padding: 8px 16px;
            z-index: 1000;
            font-size: 0.85em;
            font-weight: 600;
            border-radius: 0 0 var(--radius-sm) 0;
            transition: top 0.2s var(--ease-out);
        }
        .skip-link:focus {
            top: 0;
        }

        .container {
            max-width: {% block max_width %}1300px{% endblock %};
            margin: 0 auto;
            background: var(--bg-base);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-lg);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* Header & Navigation — glassmorphic */
        .header {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            color: var(--text-primary);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header h1 {
            font-size: 1.15em;
            margin: 0;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header p {
            opacity: 0.7;
            font-size: 0.82em;
            margin-top: 2px;
            color: var(--text-secondary);
        }

        .nav-links {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            transition: all 0.2s var(--ease-out);
            font-size: 0.8em;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .nav-links a:hover {
            background: var(--accent-subtle);
            color: var(--text-primary);
        }

        .nav-links a.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .nav-links a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .nav-links svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* Content Area */
        .content {
            padding: 16px;
        }

        /* Common Layouts */
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            padding: 20px;
        }

        .settings-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: var(--radius-md);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .settings-panel h3 {
            color: var(--accent);
            font-size: 0.95em;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        /* Sections */
        .section {
            margin-bottom: 12px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--accent);
        }

        .section h2, .section h3 {
            color: var(--accent);
            margin-bottom: 8px;
            font-size: 0.88em;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        /* Settings Cards — glass surface */
        .settings-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: var(--radius-md);
            border-left: 3px solid var(--accent);
            transition: border-color 0.2s var(--ease-out);
        }

        .settings-card h4 {
            color: var(--accent);
            font-size: 0.95em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .settings-card p {
            color: var(--text-primary);
            font-size: 0.88em;
            margin-bottom: 8px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.82em;
        }

        .form-group .description,
        .form-group small {
            font-size: 0.72em;
            color: var(--text-secondary);
            margin-top: 4px;
            display: block;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="color"],
        .form-group input[type="password"],
        .form-group select,
        .form-group textarea,
        input[type="text"],
        input[type="number"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 0.82em;
            font-family: inherit;
            transition: border-color 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out);
            min-height: 38px;
        }

        select,
        .form-group select {
            color-scheme: dark;
        }

        select option,
        .form-group select option {
            background: #1a1a2e;
            color: #EDEDEF;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus,
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group input[type="checkbox"],
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 6px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 8px;
            background: var(--bg-elevated);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            border: 1px solid transparent;
            transition: border-color 0.2s var(--ease-out);
        }

        .checkbox-group:hover {
            border-color: var(--border);
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 0.82em;
            color: var(--text-primary);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        button, .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.82em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s var(--ease-out);
            font-family: inherit;
        }

        button:focus-visible, .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn-primary {
            background: var(--accent);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.13);
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-success:hover {
            background: #16A34A;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.25);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #DC2626;
            transform: translateY(-1px);
        }

        .btn-warning {
            background: var(--warning);
            color: #0a0a0c;
        }

        .btn-warning:hover {
            background: #D97706;
            transform: translateY(-1px);
        }

        .btn-save {
            width: 100%;
            padding: 11px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.88em;
            transition: all 0.2s var(--ease-out);
            margin-top: 12px;
        }

        .btn-save:hover {
            background: #16A34A;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.25);
        }

        .btn-save:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-save.btn-primary {
            background: var(--accent);
        }

        .btn-save.btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-save.btn-warning {
            background: var(--warning);
            color: #0a0a0c;
        }

        .btn-save.btn-warning:hover {
            background: #D97706;
        }

        /* Alerts & Info Boxes — glass with colored tint */
        .alert {
            display: none;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            font-size: 0.82em;
            animation: slideDown 0.25s var(--ease-out);
            border: 1px solid;
        }
        .alert.show { display: block; }

        .alert.success {
            background: var(--success-bg);
            color: var(--success);
            border-color: rgba(34, 197, 94, 0.2);
        }

        .alert.error {
            background: var(--danger-bg);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .alert.warning {
            background: var(--warning-bg);
            color: var(--warning);
            border-color: rgba(245, 158, 11, 0.2);
        }

        .alert.info {
            background: var(--info-bg);
            color: var(--info);
            border-color: rgba(59, 130, 246, 0.2);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            margin-top: 10px;
            font-size: 0.75em;
            border-left: 3px solid var(--accent);
            line-height: 1.6;
        }

        .warning-box {
            background: var(--warning-bg);
            border: 1px solid rgba(245, 158, 11, 0.15);
            color: var(--warning);
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            margin-top: 10px;
            font-size: 0.75em;
            border-left: 3px solid var(--warning);
            line-height: 1.6;
        }

        .success-box {
            background: var(--success-bg);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-left: 3px solid var(--success);
            color: var(--success);
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            margin: 12px 0;
            font-size: 0.82em;
            line-height: 1.6;
        }

        /* Status Indicators */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.82em;
            font-weight: 500;
            border: 1px solid;
        }

        .status-indicator.enabled {
            background: var(--success-bg);
            color: var(--success);
            border-color: rgba(34, 197, 94, 0.2);
        }

        .status-indicator.disabled {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            border-color: var(--border);
        }

        .status-indicator.loading {
            background: var(--info-bg);
            color: var(--info);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-dot.loading {
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Loading Spinner */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--accent);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Dividers */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }

        /* Slider Styles */
        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: box-shadow 0.2s var(--ease-out);
            box-shadow: 0 0 0 0 transparent;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 0 5px var(--accent-glow);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
        }

        input[type="range"]:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
        }

        /* Dark scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 6px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
                padding: 12px 14px;
            }

            .nav-links {
                justify-content: center;
            }

            .main-content {
                padding: 12px;
                gap: 14px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 4px;
            }

            .nav-links a {
                padding: 5px 7px;
                font-size: 0.75em;
            }

            .nav-links svg {
                width: 12px;
                height: 12px;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="container">
        <div class="header">
            <div>
                <h1>{% block page_title %}Speech to Text{% endblock %}</h1>
                {% block page_subtitle %}{% endblock %}
            </div>
            <nav class="nav-links" aria-label="Main navigation">

                <a href="/url-builder" {% if request.path == '/url-builder' %}class="active"{% endif %}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> URL Builder</a>
