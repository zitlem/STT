name = "stt-crash-reporter"
main = "cloudflare_worker.js"
compatibility_date = "2024-09-01"

# ── Deployment ──────────────────────────────────────────────────────────────
# 1. Install Wrangler:  npm install -g wrangler
# 2. Login:            wrangler login
# 3. Add secrets:      wrangler secret put GITHUB_TOKEN
#                      wrangler secret put CRASH_API_KEY
# 4. Deploy:           wrangler deploy
#
# The worker URL will be printed after deploy.
# Copy it to config.json → crash_reporting.worker_url
# ───────────────────────────────────────────────────────────────────────────

# ── Optional: KV-based server-side rate limiting ────────────────────────────
# Create the namespace first:
#   wrangler kv:namespace create CRASH_CACHE
# Then paste the returned id below and uncomment the block.
#
# [[kv_namespaces]]
# binding = "CRASH_CACHE"
# id      = "YOUR_KV_NAMESPACE_ID_HERE"
