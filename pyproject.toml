[tool.ruff]
line-length = 200
target-version = "py39"
exclude = [".venv", "_AUTOMATIC_BACKUP", "models", "installer"]

[tool.ruff.lint]
# Hard-error rules (syntax errors, undefined names, shadowed imports) plus the
# bug-finding tiers: B = bugbear (likely-bug patterns), RUF = ruff-native checks.
# (F401/F841 were cleaned once but availability-check imports and a few
# intentional unused locals remain, so they're not part of the CI gate.
# Style-tier families — docstrings, quotes, pathlib, SIM rewrites — stay off:
# they churn a deployed monolith for no behavior benefit.)
select = ["E9", "F63", "F7", "F82", "F811", "B", "RUF"]
ignore = [
    "RUF001", "RUF003",  # ambiguous-unicode: Cyrillic strings are real data here
    "RUF100",            # unused-noqa: noqa comments document intent for wider local runs
]

[tool.ruff.lint.per-file-ignores]
# Class-level constant dicts/lists are idiomatic in test classes.
"tests/*" = ["RUF012"]

[tool.mypy]
# Type checking is scoped to the stt/ package (the logic layer); the monolith
# can't be imported, so it stays unchecked until its logic is extracted here.
files = ["stt"]
python_version = "3.9"
check_untyped_defs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
# The extracted logic modules are fully annotated — keep them that way.
module = [
    "stt.text_utils",
    "stt.formatting",
    "stt.segments",
    "stt.config_utils",
    "stt.translation_utils",
    "stt.downloads",
    "stt.paths",
    "stt.self_update",
]
disallow_untyped_defs = true

[[tool.mypy.overrides]]
# Legacy capture loop: Optional process/queue attributes are runtime-guarded
# (start() sets them before the loop runs); not worth restructuring for types.
module = "stt.audio_capture"
disable_error_code = ["union-attr"]

[tool.pytest.ini_options]
testpaths = ["tests"]

# Coverage is measured over the whole stt/ package, which grows as pure logic
# is extracted out of speech_to_text.py (which cannot be imported — it has
# import-time side effects, so coverage can't instrument it directly).
# Nothing is omitted by choice: the IO-heavy regions (watchdog GUI/process
# management/provisioning, the ffmpeg capture loop, SMB/mount code) stay in
# the denominator, so the package total understates the logic layer. The 85%
# target applies per logic module (text_utils, formatting, segments,
# config_utils, translation_utils, ...), not the package total.
# Run: pytest --cov
[tool.coverage.run]
source = ["stt"]

[tool.coverage.report]
skip_covered = false
show_missing = true
